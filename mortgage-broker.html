<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Nesti AI – Mortgage Broker Lead Widget</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #0f172a 0, #020617 40%, #020617 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    .shell {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 480px;
      max-width: 100%;
    }

    .panel {
      background: #0b1120;
      color: #e5e7eb;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 12px;
      line-height: 1.5;
      box-shadow: 0 18px 45px rgba(15,23,42,0.9);
    }
    .panel h2 { font-size: 13px; margin-bottom: 6px; font-weight: 600; color: #f9fafb; }
    .panel code { background: #020617; padding: 2px 4px; border-radius: 4px; font-size: 11px; }
    .config-row { display: flex; align-items: center; gap: 6px; margin-top: 5px; }
    .config-row label { min-width: 74px; opacity: .8; font-size: 11px; }
    .config-row input {
      flex: 1; padding: 4px 7px; border-radius: 6px;
      border: 1px solid rgba(148,163,184,0.6);
      background: #020617; color: #e5e7eb; font-size: 11px; outline: none;
    }

    .chat-widget {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 18px 45px rgba(15,23,42,0.45);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 13px 16px;
      background: linear-gradient(90deg, #0d9488, #0f766e);
      color: #f9fafb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .chat-header-title { font-size: 14px; font-weight: 700; }
    .chat-header-sub   { font-size: 11px; opacity: .9; margin-top: 2px; }
    .status-pill {
      font-size: 10px; border-radius: 999px; padding: 3px 9px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
    }

    /* Step 1: Form */
    #detailsScreen {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: linear-gradient(160deg, #f0fdfa 0%, #ccfbf1 100%);
      max-height: 560px;
      overflow-y: auto;
    }
    .form-heading { font-size: 14px; font-weight: 700; color: #0f172a; }
    .form-heading span {
      display: inline-block; padding: 2px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 600; margin-left: 6px; vertical-align: middle;
      background: #0d9488; color: #fff;
    }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { font-size: 11px; font-weight: 600; color: #374151; }
    .form-group input, .form-group select {
      padding: 8px 10px; border: 1px solid #99f6e4; border-radius: 8px;
      font-size: 12px; color: #111827; outline: none; background: #fff;
      transition: border-color .15s;
    }
    .form-group input:focus, .form-group select:focus {
      border-color: #0d9488; box-shadow: 0 0 0 2px rgba(13,148,136,0.2);
    }
    .form-section-title {
      font-size: 12px; font-weight: 700; color: #0d9488; margin-top: 6px;
      padding-bottom: 4px; border-bottom: 1px solid #99f6e4;
      grid-column: 1 / -1;
    }
    .form-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-start {
      padding: 8px 20px; border-radius: 999px; border: none;
      background: #0d9488; color: #fff; font-size: 12px; font-weight: 600; cursor: pointer;
      transition: background .15s;
    }
    .btn-start:hover { background: #0f766e; }

    /* Step 2: Chat */
    #chatScreen { display: none; flex-direction: column; }
    .chat-body {
      padding: 14px; height: 340px; overflow-y: auto;
      background: radial-gradient(circle at top, #ccfbf1 0, #f0fdfa 40%, #e5e7eb 100%);
      flex-shrink: 0;
    }
    .msg-wrap { margin-bottom: 10px; max-width: 86%; }
    .msg {
      padding: 9px 12px; border-radius: 13px; font-size: 13px;
      line-height: 1.45; word-wrap: break-word;
    }
    .msg.user { margin-left: auto; background: #0d9488; color: #f9fafb; border-bottom-right-radius: 4px; }
    .msg.bot { background: #fff; color: #0f172a; border-bottom-left-radius: 4px; box-shadow: 0 3px 10px rgba(15,23,42,0.12); }
    .meta-line   { font-size: 10px; margin-top: 4px; color: #6b7280; }
    .signal-line { font-size: 10px; margin-top: 2px; color: #9ca3af; font-style: italic; }

    .chat-input-bar {
      border-top: 1px solid #e5e7eb; padding: 8px 10px; background: #f9fafb;
      display: flex; gap: 8px; align-items: center; flex-shrink: 0;
    }
    .chat-input-bar input {
      flex: 1; padding: 8px 12px; border-radius: 999px;
      border: 1px solid #d1d5db; font-size: 13px; outline: none;
    }
    .chat-input-bar input:focus { border-color: #0d9488; box-shadow: 0 0 0 2px rgba(13,148,136,0.15); }
    .chat-input-bar button {
      padding: 8px 14px; border-radius: 999px; border: none;
      background: #0f172a; color: #f9fafb; font-size: 12px; font-weight: 600; cursor: pointer;
    }
    .chat-input-bar button:disabled { opacity: .5; cursor: default; }

    .hot      { color: #ef4444; font-weight: 700; }
    .warm     { color: #f59e0b; font-weight: 700; }
    .cold     { color: #60a5fa; font-weight: 700; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .score-badge {
      font-size: 12px; padding: 4px 10px; border-radius: 999px;
      background: #f1f5f9; color: #334155; font-weight: 600;
    }
    .temp-hint { font-size: 10px; color: #64748b; margin-top: 2px; }
  </style>
</head>
<body>
<div class="shell">

  <div class="panel">
    <h2>Nesti AI – Mortgage Broker Widget</h2>
    <div>Paste an <code>embedToken</code> from a mortgage broker's embed to start.</div>
    <div class="config-row">
      <label>Embed token</label>
      <input id="embedTokenInput" type="text" placeholder="token from /api/embed/generate" />
    </div>
    <div class="config-row">
      <label>API URL</label>
      <input id="apiUrlInput" type="text" value="http://localhost:5000/api/chat" />
    </div>
  </div>

  <div class="chat-widget">

    <div class="chat-header">
      <div>
        <div class="chat-header-title">Nesti AI – Mortgage</div>
        <div class="chat-header-sub">24/7 Mortgage Lead Assistant</div>
      </div>
      <div class="header-right">
        <div class="score-badge" id="scoreBadge" style="display:none;"></div>
        <div class="status-pill" id="statusPill">Step 1 of 2</div>
      </div>
    </div>

    <!-- STEP 1: Mortgage form -->
    <div id="detailsScreen">
      <div class="form-heading">
        Get your mortgage pre-approval
        <span>Mortgage Lead</span>
      </div>

      <div class="form-grid">
        <div class="form-section-title">Contact Information</div>
        <div class="form-group">
          <label>Full Name *</label>
          <input id="f_name" type="text" placeholder="John Smith" />
        </div>
        <div class="form-group">
          <label>Phone *</label>
          <input id="f_phone" type="tel" placeholder="+1 555 000 0000" />
        </div>
        <div class="form-group full">
          <label>Email *</label>
          <input id="f_email" type="email" placeholder="you@example.com" />
        </div>
        <div class="form-group full">
          <label>Target area / address</label>
          <input id="f_address" type="text" placeholder="e.g. DHA Lahore, 123 Main St, or City" />
        </div>

        <div class="form-section-title">Mortgage Qualification (NESTI 100-point)</div>
        <div class="form-group">
          <label>When do you plan to apply?</label>
          <select id="f_mortgage_timeline">
            <option value="">Select…</option>
            <option value="immediately">Immediately</option>
            <option value="1_2_months">Within 1–2 months</option>
            <option value="3_6_months">3–6 months</option>
            <option value="6_12_months">6–12 months</option>
            <option value="just_researching">Just researching</option>
          </select>
        </div>
        <div class="form-group">
          <label>Pre-approval status</label>
          <select id="f_pre_approval">
            <option value="">Select…</option>
            <option value="need_now">Need pre-approval now</option>
            <option value="expired">Pre-approval expired</option>
            <option value="in_progress">Pre-approval in progress</option>
            <option value="already_approved">Already approved</option>
            <option value="just_researching">Just researching</option>
          </select>
        </div>
        <div class="form-group">
          <label>Credit score range</label>
          <select id="f_credit_score">
            <option value="">Select…</option>
            <option value="750_plus">750+</option>
            <option value="700_749">700–749</option>
            <option value="650_699">650–699</option>
            <option value="600_649">600–649</option>
            <option value="under_600">Under 600</option>
          </select>
        </div>
        <div class="form-group">
          <label>Employment status</label>
          <select id="f_employment">
            <option value="">Select…</option>
            <option value="full_time">Full-time employed</option>
            <option value="self_employed">Self-employed</option>
            <option value="contract">Contract worker</option>
            <option value="new_job">New job (&lt;1 year)</option>
            <option value="unemployed">Unemployed</option>
          </select>
        </div>
        <div class="form-group">
          <label>Household income</label>
          <select id="f_income">
            <option value="">Select…</option>
            <option value="200k_plus">$200k+</option>
            <option value="150k_200k">$150k–200k</option>
            <option value="100k_150k">$100k–150k</option>
            <option value="70k_100k">$70k–100k</option>
            <option value="under_70k">Under $70k</option>
          </select>
        </div>
        <div class="form-group">
          <label>Down payment readiness</label>
          <select id="f_down_payment">
            <option value="">Select…</option>
            <option value="20_plus">20%+</option>
            <option value="10_19">10–19%</option>
            <option value="5_9">5–9%</option>
            <option value="under_5">Under 5%</option>
            <option value="no_savings">No savings yet</option>
          </select>
        </div>
        <div class="form-group full">
          <label>Property budget / price range</label>
          <input id="f_budget" type="text" placeholder="e.g. $400K – $600K" />
        </div>
        <div class="form-group">
          <label>Property budget clarity</label>
          <select id="f_property_budget">
            <option value="">Select…</option>
            <option value="clearly_defined">Clearly defined</option>
            <option value="approximate">Approximate range</option>
            <option value="not_sure">Not sure yet</option>
          </select>
        </div>
        <div class="form-group">
          <label>Purchase purpose</label>
          <select id="f_purchase_purpose">
            <option value="">Select…</option>
            <option value="primary_residence">Primary residence</option>
            <option value="investment">Investment property</option>
            <option value="vacation_home">Vacation home</option>
          </select>
        </div>
        <div class="form-group">
          <label>If approved tomorrow, start house hunting?</label>
          <select id="f_urgency">
            <option value="">Select…</option>
            <option value="yes">Yes</option>
            <option value="maybe">Maybe</option>
            <option value="no">No</option>
          </select>
        </div>

        <div class="form-section-title">Contact Preferences</div>
        <div class="form-group">
          <label>Preferred contact method</label>
          <select id="f_contact_method">
            <option value="">Select…</option>
            <option value="phone">Phone call</option>
            <option value="text">Text / SMS</option>
            <option value="email">Email</option>
            <option value="whatsapp">WhatsApp</option>
            <option value="video_call">Video meeting</option>
            <option value="in_person">In-person</option>
          </select>
        </div>
        <div class="form-group">
          <label>Best time to contact</label>
          <select id="f_best_time">
            <option value="">Anytime</option>
            <option value="morning">Morning</option>
            <option value="afternoon">Afternoon</option>
            <option value="evening">Evening</option>
            <option value="anytime">Anytime</option>
          </select>
        </div>
      </div>

      <div class="form-actions">
        <button class="btn-start" onclick="startChat()">Start Chat →</button>
      </div>
    </div>

    <!-- STEP 2: Chat -->
    <div id="chatScreen">
      <div id="chatBody" class="chat-body"></div>
      <div class="chat-input-bar">
        <input id="messageInput" type="text" placeholder="Type your message…" />
        <button id="sendBtn">Send</button>
      </div>
    </div>

  </div>
</div>

<script>
  let formData = {};

  const VISITOR_ID = 'visitor-' + Math.random().toString(36).slice(2, 10);
  const SESSION_ID = 'session-' + Math.random().toString(36).slice(2, 10);

  async function startChat() {
    const name  = document.getElementById('f_name').value.trim();
    const phone = document.getElementById('f_phone').value.trim();
    const email = document.getElementById('f_email').value.trim();

    if (!name || !phone || !email) {
      alert('Please fill in your name, phone, and email to continue.');
      return;
    }

    formData = {
      intent: 'buy',
      name,
      phone,
      email,
      address:               document.getElementById('f_address').value.trim(),
      professionalType: 'mortgage_broker',
      mortgage_timeline:      document.getElementById('f_mortgage_timeline').value,
      pre_approval_status:   document.getElementById('f_pre_approval').value,
      credit_score_range:    document.getElementById('f_credit_score').value,
      employment_status:     document.getElementById('f_employment').value,
      household_income:      document.getElementById('f_income').value,
      down_payment_readiness: document.getElementById('f_down_payment').value,
      budget:                document.getElementById('f_budget').value.trim(),
      property_budget:       document.getElementById('f_property_budget').value,
      purchase_purpose:      document.getElementById('f_purchase_purpose').value,
      urgency_signal:        document.getElementById('f_urgency').value,
      preferred_contact_method: document.getElementById('f_contact_method').value,
      best_time_to_contact:  document.getElementById('f_best_time').value,
    };

    document.getElementById('detailsScreen').style.display = 'none';
    document.getElementById('chatScreen').style.display    = 'flex';
    document.getElementById('statusPill').textContent = 'Live chat';

    const formContactOverride = {
      intent: 'buy',
      professionalType: 'mortgage_broker',
      name: formData.name,
      email: formData.email,
      phone: formData.phone,
      address:               formData.address,
      mortgage_timeline:      formData.mortgage_timeline,
      pre_approval_status:   formData.pre_approval_status,
      credit_score_range:    formData.credit_score_range,
      employment_status:     formData.employment_status,
      household_income:      formData.household_income,
      down_payment_readiness: formData.down_payment_readiness,
      budget:                formData.budget,
      property_budget:       formData.property_budget,
      purchase_purpose:      formData.purchase_purpose,
      urgency_signal:        formData.urgency_signal,
      preferred_contact_method: formData.preferred_contact_method,
      best_time_to_contact:  formData.best_time_to_contact,
    };

    try {
      const apiBase = document.getElementById('apiUrlInput').value.trim() || 'http://localhost:5000/api/chat';
      const scoreUrl = apiBase.replace(/\/$/, '') + '/score-preview';
      const scoreRes = await fetch(scoreUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ formContact: formContactOverride, professionalType: 'mortgage_broker' }),
      });
      const scoreData = await scoreRes.json();
      if (scoreData.success && scoreData.lead_score != null) {
        const badge = document.getElementById('scoreBadge');
        const gc = gradeClass(scoreData.lead_grade || 'cold');
        const tempHint = scoreData.lead_grade === 'hot' ? '🔥 Ready for Mortgage Now' :
          scoreData.lead_grade === 'warm' ? '🌤 Likely soon' : '❄️ Early stage';
        badge.innerHTML = `Score: <span class="${gc}">${scoreData.lead_score}</span>/100 · ${scoreData.lead_classification || ''}<br><span class="temp-hint">${tempHint}</span>`;
        badge.style.display = '';
      }
    } catch (e) {
      console.warn('Score preview failed:', e);
    }

    sendMessage(buildOpeningMessage(), true, formContactOverride);
  }

  function buildOpeningMessage() {
    const parts = [];
    parts.push(`Hi! My name is ${formData.name}.`);
    parts.push(`I'm looking for mortgage pre-approval.`);

    if (formData.mortgage_timeline) parts.push(`I plan to apply ${formData.mortgage_timeline.replace(/_/g, ' ')}.`);
    if (formData.pre_approval_status) parts.push(`Pre-approval status: ${formData.pre_approval_status.replace(/_/g, ' ')}.`);
    if (formData.credit_score_range) parts.push(`Credit score: ${formData.credit_score_range.replace(/_/g, ' ')}.`);
    if (formData.employment_status) parts.push(`Employment: ${formData.employment_status.replace(/_/g, ' ')}.`);
    if (formData.household_income) parts.push(`Household income: ${formData.household_income.replace(/_/g, ' ')}.`);
    if (formData.down_payment_readiness) parts.push(`Down payment: ${formData.down_payment_readiness.replace(/_/g, ' ')}.`);
    if (formData.budget) parts.push(`Budget: ${formData.budget}.`);
    if (formData.address) parts.push(`Target area: ${formData.address}.`);
    if (formData.purchase_purpose) parts.push(`Purchase purpose: ${formData.purchase_purpose.replace(/_/g, ' ')}.`);
    if (formData.urgency_signal) parts.push(`If approved tomorrow, I would ${formData.urgency_signal === 'yes' ? 'start house hunting immediately' : formData.urgency_signal === 'maybe' ? 'maybe start' : 'not start yet'}.`);
    parts.push(`My email is ${formData.email} and my phone is ${formData.phone}.`);

    return parts.join(' ');
  }

  const chatBody   = document.getElementById('chatBody');
  const msgInput   = document.getElementById('messageInput');
  const sendBtn    = document.getElementById('sendBtn');
  const statusPill = document.getElementById('statusPill');

  function gradeClass(g) {
    if (g === 'hot') return 'hot';
    if (g === 'warm') return 'warm';
    return 'cold';
  }

  function appendMessage(text, from, meta) {
    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap';

    const msg = document.createElement('div');
    msg.className = 'msg ' + (from === 'user' ? 'user' : 'bot');
    msg.textContent = text;
    wrap.appendChild(msg);

    if (meta) {
      const parts = [];
      if (meta.lead_score != null) {
        const gc = gradeClass(meta.lead_grade);
        parts.push(`score: <span class="${gc}">${meta.lead_score}</span>/100`);
      }
      if (meta.lead_classification) parts.push(meta.lead_classification);
      if (meta.emotional_state)     parts.push('mood: ' + meta.emotional_state);

      if (parts.length) {
        const ml = document.createElement('div');
        ml.className = 'meta-line';
        ml.innerHTML = parts.join(' &nbsp;|&nbsp; ');
        wrap.appendChild(ml);
      }

      const s = meta.signals || {};
      const sigs = [];
      if (s.timeline) sigs.push('⏱ ' + s.timeline);
      if (s.budget)   sigs.push('💰 ' + s.budget);
      if (s.location) sigs.push('📍 ' + s.location);
      if (sigs.length) {
        const sl = document.createElement('div');
        sl.className = 'signal-line';
        sl.textContent = sigs.join('  ');
        wrap.appendChild(sl);
      }

      const c = meta.contact || {};
      const cons = [];
      if (c.name)  cons.push('👤 ' + c.name);
      if (c.email) cons.push('✉ ' + c.email);
      if (c.phone) cons.push('📞 ' + c.phone);
      if (cons.length) {
        const cl = document.createElement('div');
        cl.className = 'signal-line';
        cl.textContent = cons.join('  ');
        wrap.appendChild(cl);
      }
    }

    chatBody.appendChild(wrap);
    chatBody.scrollTop = chatBody.scrollHeight;
  }

  async function sendMessage(text, silent = false, formContactOverride = null) {
    const embedToken = document.getElementById('embedTokenInput').value.trim();
    const apiUrl     = document.getElementById('apiUrlInput').value.trim() || 'http://localhost:5000/api/chat';

    if (!text) return;
    if (!embedToken) { alert('Please paste an embed token first.'); return; }

    if (!silent) appendMessage(text, 'user');
    else {
      const summary = `🏠 Mortgage · ${formData.name} · ${formData.email}`;
      appendMessage(summary, 'user');
    }

    msgInput.value = '';
    msgInput.focus();
    sendBtn.disabled = true;
    statusPill.textContent = 'thinking…';

    const payload = {
      id:         SESSION_ID,
      message:    text,
      embedToken: embedToken,
      visitorId:  VISITOR_ID,
      agentType:  'broker',
      channel:    'web',
    };

    const formToSend = formContactOverride || (Object.keys(formData).length ? { ...formData, intent: 'buy' } : null);
    if (formToSend) payload.formContact = formToSend;

    try {
      const res = await fetch(apiUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });

      const data = await res.json();

      if (!data.success) {
        appendMessage('Error: ' + (data.message || 'Unknown error'), 'bot');
      } else {
        appendMessage(data.reply || '(no reply)', 'bot', data.meta);
        if (data.meta?.lead_score != null) {
          const badge = document.getElementById('scoreBadge');
          const gc = gradeClass(data.meta.lead_grade || 'cold');
          const tempHint = data.meta.lead_grade === 'hot' ? '🔥 Ready for Mortgage Now' :
            data.meta.lead_grade === 'warm' ? '🌤 Likely soon' : '❄️ Early stage';
          badge.innerHTML = `Score: <span class="${gc}">${data.meta.lead_score}</span>/100 · ${data.meta.lead_classification || ''}<br><span class="temp-hint">${tempHint}</span>`;
          badge.style.display = '';
        }
      }
    } catch (err) {
      appendMessage('Network error: ' + err.message, 'bot');
    } finally {
      sendBtn.disabled = false;
      statusPill.textContent = 'Live chat';
    }
  }

  sendBtn.addEventListener('click', () => sendMessage(msgInput.value.trim()));
  msgInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage(msgInput.value.trim());
  });
</script>
</body>
</html>
